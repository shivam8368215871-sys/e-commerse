<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Wishlist • Two Dots</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    *, *::before, *::after { 
      box-sizing:border-box; 
      margin:0; 
      padding:0; 
    }
    
    body { 
      font-family:'Inter', sans-serif; 
      background:#fefefe; 
      color:#1a1a1a;
      line-height:1.6;
      min-height:100vh;
    }

    /* Luxury Color Palette */
    :root {
      --primary: #000000;
      --accent: #d4af37;
      --secondary: #8B4513;
      --light: #f8f8f8;
      --dark: #1a1a1a;
      --gray: #666;
      --light-gray: #e5e5e5;
      --transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    /* Header - Luxury Style */
    .header { 
      position:sticky; 
      top:0; 
      background:rgba(255,255,255,0.98); 
      backdrop-filter:blur(20px);
      z-index:99; 
      box-shadow:0 1px 20px rgba(0,0,0,0.08); 
      border-bottom:1px solid rgba(0,0,0,0.05);
      transition: var(--transition);
    }
    
    .container { 
      display:flex; 
      justify-content:space-between; 
      align-items:center; 
      padding:18px 20px; 
      max-width:1400px;
      margin:0 auto;
    }
    
    .back-btn { 
      font-size:22px; 
      cursor:pointer; 
      color:var(--dark);
      transition:color 0.3s ease;
    }
    
    .back-btn:hover {
      color:var(--accent);
    }
    
    .logo { 
      font-family:'Playfair Display', serif;
      font-weight:700; 
      font-size:24px; 
      color:var(--primary);
      letter-spacing:-0.5px;
      position: relative;
    }
    
    .logo span {
      color:var(--accent);
    }
    
    .header-icons i { 
      margin-left:22px; 
      font-size:20px; 
      color:var(--dark);
      transition:color 0.3s ease;
      position: relative;
    }
    
    .header-icons i:hover {
      color:var(--accent);
    }
    
    .cart-badge {
      position:absolute;
      top:-8px;
      right:-10px;
      background:var(--accent);
      color:var(--primary);
      font-size:11px;
      width:20px;
      height:20px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:600;
    }

    /* Page Title - Luxury */
    .page-header {
      max-width: 1400px;
      margin: 0 auto;
      padding: 40px 20px 20px;
      border-bottom: 1px solid var(--light-gray);
      position: relative;
    }
    
    .page-header::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 20px;
      width: 60px;
      height: 2px;
      background: var(--accent);
    }
    
    .page-title {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      font-weight: 600;
      color: var(--dark);
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }
    
    .page-subtitle {
      color: var(--gray);
      font-size: 16px;
      font-weight: 400;
    }

    /* Wishlist Grid - Luxury */
    .wishlist-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 30px 20px 100px;
    }
    
    .wishlist-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
      margin-top: 20px;
    }
    
    .wishlist-item {
      background: white;
      border-radius: 0;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
      transition: all 0.4s ease;
      border: 1px solid var(--light-gray);
      position: relative;
      cursor: pointer;
    }
    
    .wishlist-item:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.15);
    }
    
    .wishlist-item img {
      width: 100%;
      height: 320px;
      object-fit: cover;
      transition: transform 0.4s ease;
    }
    
    .wishlist-item:hover img {
      transform: scale(1.05);
    }
    
    .wishlist-info {
      padding: 20px;
    }
    
    .wishlist-name {
      font-size: 16px;
      color: var(--dark);
      font-weight: 500;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 12px;
      height: 44px;
    }
    
    .wishlist-price {
      font-weight: 700;
      font-size: 18px;
      color: var(--primary);
    }
    
    .remove-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      background: white;
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
      cursor: pointer;
      z-index: 10;
      transition: all 0.3s ease;
    }
    
    .remove-btn:hover {
      background: var(--accent);
      transform: scale(1.1);
    }
    
    .remove-btn i {
      color: var(--dark);
      font-size: 18px;
      transition: color 0.3s ease;
    }
    
    .remove-btn:hover i {
      color: white;
    }

    /* Empty State - Luxury */
    .empty-state {
      text-align: center;
      padding: 120px 20px 80px;
      color: var(--gray);
      display: none;
    }
    
    .empty-state i {
      font-size: 80px;
      margin-bottom: 24px;
      opacity: 0.3;
      color: var(--accent);
    }
    
    .empty-state h3 {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      margin: 16px 0;
      color: var(--dark);
      font-weight: 600;
    }
    
    .empty-state p {
      font-size: 16px;
      margin-bottom: 40px;
      color: var(--gray);
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }
    
    .continue-btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 18px 48px;
      border-radius: 0;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      display: inline-flex;
      align-items: center;
      gap: 12px;
    }
    
    .continue-btn:hover {
      background: var(--dark);
    }
    
    .continue-btn i {
      font-size: 18px;
    }

    /* Bottom Navigation - Luxury */
    .bottom-nav {
      position: fixed;
      left: 20px;
      right: 20px;
      bottom: 20px;
      height: 72px;
      background: white;
      border-radius: 20px;
      display: flex;
      box-shadow: 0 15px 40px rgba(0,0,0,0.15);
      z-index: 1000;
      border: 1px solid var(--light-gray);
      overflow: hidden;
    }
    
    .nav-item { 
      flex:1; 
      text-align:center; 
      padding:14px 0; 
      color:var(--gray); 
      font-size:11px; 
      text-decoration:none;
      transition: all 0.3s ease;
      position: relative;
    }
    
    .nav-item.active { 
      color:var(--primary); 
    }
    
    .nav-item.active::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 30px;
      height: 2px;
      background: var(--accent);
    }
    
    .nav-item i { 
      font-size:20px; 
      display:block; 
      margin-bottom:6px; 
    }
    
    .nav-item:hover {
      color: var(--primary);
      background: var(--light);
    }

    /* Responsive Adjustments */
    @media (max-width: 768px) {
      .wishlist-grid {
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 20px;
      }
      
      .wishlist-item img {
        height: 280px;
      }
      
      .page-title {
        font-size: 28px;
      }
    }
    
    @media (max-width: 480px) {
      .wishlist-grid {
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 16px;
      }
      
      .wishlist-item img {
        height: 200px;
      }
      
      .wishlist-info {
        padding: 16px;
      }
      
      .wishlist-name {
        font-size: 14px;
        height: 40px;
      }
      
      .page-title {
        font-size: 24px;
      }
      
      .empty-state {
        padding: 80px 20px 60px;
      }
      
      .empty-state h3 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>

  <!-- Header - Luxury Version -->
  <header class="header">
    <div class="container">
      <div class="back-btn" onclick="history.back()"><i class="fas fa-arrow-left"></i></div>
      <div class="logo">TWO<span>•</span>DOTS</div>
      <div class="header-icons">
        <a href="cart.html" style="position:relative;color:inherit;text-decoration:none;display:inline-block">
          <i class="fas fa-shopping-bag"></i>
          <span class="cart-badge">0</span>
        </a>
      </div>
    </div>
  </header>

  <!-- Page Header - Luxury -->
  <div class="page-header">
    <h1 class="page-title">My Wishlist</h1>
    <p class="page-subtitle">Your curated collection of favorites</p>
  </div>

  <!-- Wishlist Content -->
  <div class="wishlist-container">
    <div id="wishlistGrid" class="wishlist-grid"></div>

    <div id="emptyState" class="empty-state">
      <i class="far fa-heart"></i>
      <h3>Your Wishlist is Empty</h3>
      <p>Discover our premium collection and save items you love for later</p>
      <button class="continue-btn" onclick="location.href='index.html'">
        <i class="fas fa-shopping-bag"></i>
        Explore Collection
      </button>
    </div>
  </div>

  <!-- Bottom Navigation -->
  <div class="bottom-nav">
    <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
    <a href="categories.html" class="nav-item"><i class="fas fa-th-large"></i><span>Shop</span></a>
    <a href="cart.html" class="nav-item"><i class="fas fa-shopping-bag"></i><span>Bag</span></a>
    <a href="account.html" class="nav-item" id="profileBottomBtn">
      <div id="profileAvatar" style="width:32px;height:32px;border-radius:50%;overflow:hidden;margin:0 auto 4px;background:#ddd;border:2px solid var(--accent);">
        <img id="profileAvatarImg" src="https://via.placeholder.com/80/ddd/999?text=?" style="width:100%;height:100%;object-fit:cover;">
      </div>
      <span id="profileText">Account</span>
    </a>
  </div>

  <script src="script.js"></script>
  <script>
    const BASE = window.BASE_URL || "https://e-commerse-tzh7.onrender.com";

    function authHeaders() {
      return {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + (localStorage.getItem("twoDotsToken") || "")
      };
    }

    function fixImageUrl(url) {
      if (!url) return "";
      try { return new URL(url, window.location.href).href; } catch { return url; }
    }

    const grid = document.getElementById("wishlistGrid");
    const emptyState = document.getElementById("emptyState");

    async function loadWishlist() {
      const token = localStorage.getItem("twoDotsToken");
      if (!token) { location.href = "login.html"; return; }

      try {
        const res = await fetch(`${BASE}/wishlist`, { headers: authHeaders() });
        if (!res.ok) throw new Error("Failed");
        const wishlist = await res.json();

        if (wishlist.length === 0) {
          emptyState.style.display = "block";
          grid.style.display = "none";
        } else {
          emptyState.style.display = "none";
          grid.style.display = "grid";
          grid.innerHTML = wishlist.map(product => `
            <div class="wishlist-item" onclick="location.href='product.html?id=${product.id}'">
              <img src="${fixImageUrl(product.image)}" alt="${product.name}" loading="lazy">
              <div class="wishlist-info">
                <div class="wishlist-name">${product.name}</div>
                <div class="wishlist-price">&#8377;${product.price}</div>
              </div>
              <button onclick="event.stopPropagation(); removeFromWishlist(${product.id})"
                      style="position:absolute;top:10px;right:10px;background:white;border:none;padding:10px;border-radius:50%;box-shadow:0 4px 15px rgba(0,0,0,0.2);cursor:pointer;z-index:10;">
                <i class="fas fa-heart" style="color:#e91e63;font-size:18px;"></i>
              </button>
            </div>
          `).join("");
        }
      } catch(e) {
        emptyState.style.display = "block";
        grid.style.display = "none";
      }
    }

    window.removeFromWishlist = async function(productId) {
      try {
        await fetch(`${BASE}/wishlist/${productId}`, {
          method: "DELETE", headers: authHeaders()
        });
        loadWishlist();
      } catch(e) {
        alert("Failed to remove. Please try again.");
      }
    };

    document.addEventListener("DOMContentLoaded", loadWishlist);
  </script>

</body>
</html>
