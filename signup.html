<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up • Two Dots</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* Luxury Color Palette */
    :root {
      --primary: #000000;
      --accent: #d4af37;
      --secondary: #8B4513;
      --light: #f8f8f8;
      --dark: #1a1a1a;
      --gray: #666;
      --light-gray: #e5e5e5;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, var(--primary), #2a2a2a);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: white;
      max-width: 420px;
      width: 100%;
      border-radius: 0;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      border: 1px solid var(--light-gray);
    }

    .header {
      background: linear-gradient(135deg, var(--primary), #2a2a2a);
      color: white;
      text-align: center;
      padding: 50px 30px;
      position: relative;
      overflow: hidden;
    }

    .header::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(45deg, rgba(212,175,55,0.1), transparent);
    }

    .header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 12px;
      position: relative;
      z-index: 2;
      letter-spacing: -0.5px;
    }

    .header p {
      font-size: 16px;
      opacity: 0.9;
      position: relative;
      z-index: 2;
      font-weight: 300;
    }

    .form {
      padding: 40px 28px;
    }

    .input-group {
      position: relative;
      margin-bottom: 20px;
    }

    .input-group i.fa-user,
    .input-group i.fa-calendar-alt,
    .input-group i.fa-phone,
    .input-group i.fa-envelope,
    .input-group i.fa-lock,
    .input-group i.fa-venus-mars {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray);
      font-size: 20px;
      z-index: 2;
    }

    .input-group input,
    .input-group select {
      width: 100%;
      padding: 18px 50px 18px 60px;
      border: 2px solid var(--light-gray);
      border-radius: 0;
      font-size: 15.5px;
      background: white;
      transition: all 0.3s ease;
      font-family: 'Inter', sans-serif;
    }

    .input-group input:focus,
    .input-group select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(212,175,55,0.1);
    }

    .input-group select {
      appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23888'%3e%3cpath d='M7 10l5 5 5-5z'/%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 18px center;
      background-size: 16px;
    }

    .btn {
      width: 100%;
      padding: 18px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 0;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 20px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
      border: 2px solid var(--primary);
    }

    .btn:hover {
      background: transparent;
      color: var(--primary);
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(0,0,0,0.25);
    }

    .btn:active {
      transform: translateY(0);
    }

    .switch {
      text-align: center;
      margin-top: 28px;
      font-size: 15px;
      color: var(--gray);
    }

    .switch a {
      color: var(--accent);
      font-weight: 600;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .switch a:hover {
      color: var(--primary);
      text-decoration: underline;
    }

    /* Loading Animation */
    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid #f3f3f3;
      border-top: 2px solid var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Password Toggle - FIXED POSITION */
    .password-toggle {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray);
      cursor: pointer;
      z-index: 2;
      transition: color 0.3s ease;
    }

    .password-toggle:hover {
      color: var(--accent);
    }

    /* Responsive Design */
    @media (max-width: 480px) {
      .card {
        border-radius: 0;
      }

      .header {
        padding: 40px 25px;
      }

      .header h1 {
        font-size: 28px;
      }

      .form {
        padding: 32px 22px;
      }

      .input-group input,
      .input-group select {
        padding: 16px 46px 16px 56px;
        font-size: 15px;
      }

      .btn {
        padding: 16px;
        font-size: 16px;
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="header">
      <h1>Join Two Dots</h1>
      <p>Create your account</p>
    </div>

    <div class="form">
      <!-- 1. Full Name -->
      <div class="input-group">
        <i class="fas fa-user"></i>
        <input type="text" id="name" placeholder="Full Name" required>
      </div>

      <!-- 2. Date of Birth -->
      <div class="input-group">
        <i class="fas fa-calendar-alt"></i>
        <input type="date" id="dob" required>
      </div>

      <!-- 3. Phone Number -->
      <div class="input-group">
        <i class="fas fa-phone"></i>
        <input type="tel" id="phone" placeholder="Phone Number" maxlength="10" required>
      </div>

      <!-- 4. Email -->
      <div class="input-group">
        <i class="fas fa-envelope"></i>
        <input type="email" id="email" placeholder="Email Address" required>
      </div>

      <!-- 5. Password -->
      <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="pass" placeholder="Create Password (6+ chars)" required>
        <i class="fas fa-eye password-toggle" id="togglePassword"></i>
      </div>

      <!-- 6. Gender (Optional) -->
      <div class="input-group">
        <i class="fas fa-venus-mars"></i>
        <select id="gender">
          <option value="" disabled selected>Select Gender (optional)</option>
          <option>Male</option>
          <option>Female</option>
          <option>Other</option>
        </select>
      </div>

      <button class="btn" onclick="signup()" id="signupBtn">
        Create Account
      </button>

      <div class="switch">
        Already have an account? <a href="login.html">Login</a>
      </div>
    </div>
  </div>

 <script src="script.js"></script>
 <script>
  // Password toggle
  document.getElementById('togglePassword').addEventListener('click', function() {
    const passwordInput = document.getElementById('pass');
    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
    passwordInput.setAttribute('type', type);
    this.classList.toggle('fa-eye');
    this.classList.toggle('fa-eye-slash');
  });
</script>
</body>
</html>
