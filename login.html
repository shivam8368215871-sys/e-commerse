<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login • Two Dots</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* Luxury Color Palette */
    :root {
      --primary: #000000;
      --accent: #d4af37;
      --secondary: #8B4513;
      --light: #f8f8f8;
      --dark: #1a1a1a;
      --gray: #666;
      --light-gray: #e5e5e5;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, var(--primary), #2a2a2a);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: white;
      width: 100%;
      max-width: 420px;
      border-radius: 0;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      border: 1px solid var(--light-gray);
    }

    .header {
      background: linear-gradient(135deg, var(--primary), #2a2a2a);
      color: white;
      text-align: center;
      padding: 50px 30px;
      position: relative;
      overflow: hidden;
    }

    .header::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(45deg, rgba(212,175,55,0.1), transparent);
    }

    .header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 12px;
      position: relative;
      z-index: 2;
      letter-spacing: -0.5px;
    }

    .header p {
      font-size: 16px;
      opacity: 0.9;
      position: relative;
      z-index: 2;
      font-weight: 300;
    }

    .form {
      padding: 40px 28px;
    }

    .input-group {
      position: relative;
      margin-bottom: 24px;
    }

    .input-group i.fa-envelope,
    .input-group i.fa-lock {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray);
      font-size: 20px;
      z-index: 2;
    }

    .input-group input {
      width: 100%;
      padding: 18px 50px 18px 60px;
      border: 2px solid var(--light-gray);
      border-radius: 0;
      font-size: 15.5px;
      background: white;
      transition: all 0.3s ease;
      font-family: 'Inter', sans-serif;
    }

    .input-group input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(212,175,55,0.1);
    }

    .btn {
      width: 100%;
      padding: 18px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 0;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 16px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
      border: 2px solid var(--primary);
    }

    .btn:hover {
      background: transparent;
      color: var(--primary);
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(0,0,0,0.25);
    }

    .btn:active {
      transform: translateY(0);
    }

    .switch {
      text-align: center;
      margin-top: 28px;
      font-size: 15px;
      color: var(--gray);
    }

    .switch a {
      color: var(--accent);
      font-weight: 600;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .switch a:hover {
      color: var(--primary);
      text-decoration: underline;
    }

    /* Loading Animation */
    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid #f3f3f3;
      border-top: 2px solid var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Responsive Design */
    @media (max-width: 480px) {
      .card {
        border-radius: 0;
      }

      .header {
        padding: 40px 25px;
      }

      .header h1 {
        font-size: 28px;
      }

      .form {
        padding: 32px 22px;
      }

      .input-group input {
        padding: 16px 46px 16px 56px;
        font-size: 15px;
      }

      .btn {
        padding: 16px;
        font-size: 16px;
      }
    }

    /* Password Toggle - FIXED POSITION */
    .password-toggle {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray);
      cursor: pointer;
      z-index: 2;
      transition: color 0.3s ease;
    }

    .password-toggle:hover {
      color: var(--accent);
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="header">
      <h1>Welcome Back</h1>
      <p>Login to your Two Dots account</p>
    </div>

    <div class="form">
      <div class="input-group">
        <i class="fas fa-envelope"></i>
        <input type="email" id="email" placeholder="Email Address" required>
      </div>

      <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="pass" placeholder="Password" required>
        <i class="fas fa-eye password-toggle" id="togglePassword"></i>
      </div>

      <button class="btn" onclick="login()" id="loginBtn">
        Login Now
      </button>

      <div class="switch">
        New here? <a href="signup.html">Create Account</a>
      </div>
    </div>
  </div>

  <script>
  // Password toggle (UNCHANGED)
  document.getElementById('togglePassword').addEventListener('click', function() {
    const passwordInput = document.getElementById('pass');
    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
    passwordInput.setAttribute('type', type);
    this.classList.toggle('fa-eye');
    this.classList.toggle('fa-eye-slash');
  });

  async function login() {
    const email = document.getElementById("email").value.trim();
    const pass = document.getElementById("pass").value;
    const loginBtn = document.getElementById("loginBtn");

    if (!email || !pass) {
      return alert("Please fill all fields");
    }

    loginBtn.innerHTML = '<div class="loading-spinner"></div>Logging in...';
    loginBtn.disabled = true;

    try {
      const res = await fetch("https://e-commerse-tzh7.onrender.com/login", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          email,
          password: pass
        })
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.error || "Login failed");
      }

      // SAVE USER (keep your system working)
      localStorage.setItem("twoDotsUser", JSON.stringify(data.user));

      alert("Welcome back, " + (data.user.name?.split(" ")[0] || "User") + "!");
      location.href = "account.html";

    } catch (err) {
      alert(err.message);
    }

    loginBtn.innerHTML = 'Login Now';
    loginBtn.disabled = false;
  }

  // Enter key (UNCHANGED)
  document.addEventListener("keypress", function(e) {
    if (e.key === "Enter") login();
  });
</script>
</body>
</html>
